version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:h2:mem:test
      - QUARKUS_DATASOURCE_USERNAME=sa
      - QUARKUS_DATASOURCE_PASSWORD=
  db:
    image: h2database/h2:latest
    ports:
      - "8080:8080"
    volumes:
      - ./h2-data:/h2-data
